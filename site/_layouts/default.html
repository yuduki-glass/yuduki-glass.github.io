<!DOCTYPE html>
<html lang="ja">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- favicon群ここから -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="結月硝子" />
  <link rel="manifest" href="/site.webmanifest" />
  <!-- favicon群ここまで -->

  <title>{{ page.title }}</title>

  {% if page.robots == "noindex" %}
  <meta name="robots" content="noindex">
  {% endif %}

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WH8Q2HQG8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0WH8Q2HQG8');
  </script>
  <meta name="msvalidate.01" content="1F6931B2DA3D4E83898995572ED9EA15" />
</head>

<body>

  <div class="mouse-glow" id="mouse-glow"></div>
  
  <div class="parallax-container">

    <div class="bg-base"></div> 
    <div class="bg-light-glow" id="parallax-bg"></div> 
    <div class="bg-svg"></div> <div class="glass-layer"></div>

    <div class="layout">
      <a href="{{ '/' | relative_url }}" class="site-logo">結月硝子</a>

      <aside class="sidebar-left">
      </aside>

<main class="content {% if page.page_type == 'sub' %}sub-page{% endif %}">
  {{ content }}

        <footer class="site-footer">
          <a href="{{ '/privacy-policy/' | relative_url }}">
            記録と取り扱いについて
          </a>
          <span class="footer-separator"> / </span>
          <a href="{{ '/contact/' | relative_url }}">
            お問い合わせ
          </a>
        </footer>
      </main>

      <aside class="sidebar-right">
        <header class="site-header">
          <nav class="site-nav">
            <a href="{{ '/thoughts' | relative_url }}">ゆづき がらす</a>
          </nav>
        </header>
      </aside>

    </div></div><script>
    // マウスの動きを追いかける設定（CSS変数に座標を渡す）
    window.addEventListener('mousemove', (e) => {
      document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
      document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
    });

    // スクロール連動：1文字ずつ分解して時間差で浮き上がらせる文字ブラー演出
    window.addEventListener('load', () => {
      const revealElements = document.querySelectorAll('.blur-reveal');

      revealElements.forEach(el => {
        const text = el.innerHTML.trim();
        let html = '';
        let charIndex = 0;

        for (let i = 0; i < text.length; i++) {
          if (text.substr(i, 4) === '<br>') {
            html += '<div class="reveal-gap"></div>';
            i += 3; 
          } else {
            const char = text[i];
            if (char.trim() === '') {
              html += char;
            } else {
              html += `<span class="reveal-char" style="transition-delay: ${charIndex * 0.08}s">${char}</span>`;
              charIndex++;
            }
          }
        }
        el.innerHTML = html;
      });

      // 3Dコンテナ（.parallax-container）がスクロールの親玉になったので、そこを基準に画面内判定を行う
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target); 
          }
        });
      }, {
        root: null, 
        rootMargin: '0px 0px -15% 0px',
        threshold: 0.1
      });

      document.querySelectorAll('.blur-reveal, a').forEach(el => observer.observe(el));

      // ==========================================================================
      // 【ここから追記】新トップページ専用：安全なスクロール連動（下から2割で発火）
      // ==========================================================================
      const glassObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            // 画面の下から2割に入ったら「is-active」クラスを付与
            entry.target.classList.add('is-active');
            glassObserver.unobserve(entry.target); // 1回発火したら監視終了
          }
        });
      }, {
        root: null,
        // 下から20%の位置を通過したら発火（しのさんの理想のタイミング）
        rootMargin: '0px 0px -20% 0px',
        threshold: 0.05 // 要素の頭がわずかでもかすめたら即発火
      });

      // すりガラスカードとタイムラインアイテムだけをピンポイントで監視
      document.querySelectorAll('.glass-card, .timeline-item').forEach(el => {
        glassObserver.observe(el);
      });
    });
  </script>
</body>
</html>
