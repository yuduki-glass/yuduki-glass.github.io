<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硝子片集め</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="wrap">
        
        <button id="collectionBtn" type="button">硝子片集</button>

        <div id="collectionView" style="display: none;">
            <div id="collectionGrid"></div>
            <button id="closeCollection" type="button">閉じる</button>
        </div>

        <div id="itemPopup" class="popup-overlay" style="display: none;">
            <div class="popup-content">
                <div id="popupImageWrap"></div>
                <h2 id="popupName"></h2>
                <div id="popupDesc"></div>
            </div>
        </div>

        <script src="js/collection.js" defer></script>
        <script src="js/game.js" defer></script>
    </div>

</body>
</html>
